name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unit & Static Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq git fzf

      - name: Configure git
        run: |
          git config --global user.email "ci@tmux-worktree-agent"
          git config --global user.name "CI Runner"
          git config --global --unset init.defaultBranch || true

      - name: Make scripts executable
        run: chmod +x scripts/*.sh lib/*.sh worktree-agent.tmux tests/*.sh

      - name: Static analysis
        run: bash tests/test-static.sh

      - name: Unit tests
        run: bash tests/test-unit.sh
